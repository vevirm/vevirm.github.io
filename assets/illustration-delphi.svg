<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Dialectic Delphi rupture</title>
  <desc id="desc">A rupture in the ground separates option A and option B, each questioned in terms of probability and desirability.</desc>
  <rect width="720" height="420" rx="34" fill="#fff"/>
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="186" y="82" font-size="22" font-weight="850" fill="#b20f16">Probability —</text>
    <text x="186" y="112" font-size="22" font-weight="850" fill="#b20f16">and what about desirability?</text>
    <text x="534" y="82" font-size="22" font-weight="850" fill="#b20f16">Probability —</text>
    <text x="534" y="112" font-size="22" font-weight="850" fill="#b20f16">and what about desirability?</text>
  </g>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M72 258 C150 238 230 240 314 260" stroke="#111" stroke-width="6"/>
    <path d="M406 260 C486 240 572 238 648 258" stroke="#111" stroke-width="6"/>
    <path d="M330 248 L302 286 L343 311 L319 362" stroke="#b20f16" stroke-width="7"/>
    <path d="M391 248 L421 287 L379 313 L405 362" stroke="#b20f16" stroke-width="7"/>
    <path d="M337 254 L360 294 L383 254" stroke="#111" stroke-width="4" opacity="0.5"/>
    <path d="M92 285 C160 306 244 305 306 290" stroke="#111" stroke-width="3" opacity="0.35"/>
    <path d="M414 290 C480 305 566 305 628 285" stroke="#111" stroke-width="3" opacity="0.35"/>
  </g>
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-weight="900" text-anchor="middle">
    <text x="186" y="212" font-size="36" fill="#111">Option A</text>
    <text x="534" y="212" font-size="36" fill="#111">Option B</text>
  </g>
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#626262" text-anchor="middle">
    <text x="360" y="390">opposed futures made visible</text>
  </g>
</svg>
